<svg viewBox="0 0 580 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh2"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/></filter>
  </defs>

  <!-- ====== RX Section ====== -->
  <text x="290" y="18" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="700" font-family="sans-serif">━━━  RX  ━━━</text>

  <rect x="30" y="30" width="130" height="36" rx="7" fill="rgba(46,204,113,0.06)" stroke="rgba(46,204,113,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="95" y="53" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="600" font-family="sans-serif">/WSaudioRX</text>
  <text x="95" y="63" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">binary data</text>

  <rect x="185" y="30" width="130" height="36" rx="7" fill="rgba(243,156,18,0.06)" stroke="rgba(243,156,18,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="250" y="53" text-anchor="middle" fill="#f39c12" font-size="11" font-weight="600" font-family="sans-serif">Strip Codec Tag</text>
  <text x="250" y="63" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">1B tag detect</text>

  <rect x="340" y="30" width="100" height="36" rx="7" fill="rgba(52,152,219,0.06)" stroke="rgba(52,152,219,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="390" y="53" text-anchor="middle" fill="#3498db" font-size="11" font-weight="600" font-family="sans-serif">Int16→Float32</text>
  <text x="390" y="63" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">conversion</text>

  <rect x="460" y="30" width="100" height="36" rx="7" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="510" y="48" text-anchor="middle" fill="#9b59b6" font-size="11" font-weight="600" font-family="sans-serif">AVAudio</text>
  <text x="510" y="60" text-anchor="middle" fill="#9b59b6" font-size="10" font-family="sans-serif">PlayerNode</text>

  <!-- RX Arrows -->
  <line x1="160" y1="48" x2="185" y2="48" stroke="rgba(255,255,255,0.15)" stroke-width="1.3"/>
  <polygon points="180,44 185,48 180,52" fill="rgba(255,255,255,0.25)"/>
  <line x1="315" y1="48" x2="340" y2="48" stroke="rgba(255,255,255,0.15)" stroke-width="1.3"/>
  <polygon points="335,44 340,48 335,52" fill="rgba(255,255,255,0.25)"/>
  <line x1="440" y1="48" x2="460" y2="48" stroke="rgba(255,255,255,0.15)" stroke-width="1.3"/>
  <polygon points="455,44 460,48 455,52" fill="rgba(255,255,255,0.25)"/>

  <!-- RX output label -->
  <text x="290" y="82" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">48kHz output via AVAudioEngine</text>

  <!-- ====== Divider ====== -->
  <line x1="20" y1="102" x2="560" y2="102" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ====== TX Section ====== -->
  <text x="290" y="122" text-anchor="middle" fill="#e67e22" font-size="14" font-weight="700" font-family="sans-serif">━━━  TX  ━━━</text>

  <rect x="30" y="135" width="100" height="36" rx="7" fill="rgba(231,76,60,0.06)" stroke="rgba(231,76,60,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="80" y="158" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="600" font-family="sans-serif">Mic Input</text>
  <text x="80" y="168" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">native rate</text>

  <rect x="150" y="135" width="110" height="36" rx="7" fill="rgba(243,156,18,0.06)" stroke="rgba(243,156,18,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="205" y="158" text-anchor="middle" fill="#f39c12" font-size="10" font-family="sans-serif">Downsample 3×</text>
  <text x="205" y="168" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">48k → 16k</text>

  <rect x="280" y="135" width="120" height="36" rx="7" fill="rgba(52,152,219,0.06)" stroke="rgba(52,152,219,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="340" y="158" text-anchor="middle" fill="#3498db" font-size="10" font-family="sans-serif">320-Sample Frame</text>
  <text x="340" y="168" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">Float32 → Int16</text>

  <rect x="420" y="135" width="130" height="36" rx="7" fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.2)" stroke-width="1" filter="url(#sh2)"/>
  <text x="485" y="154" text-anchor="middle" fill="#9b59b6" font-size="10" font-family="sans-serif">onFrame callback</text>
  <text x="485" y="166" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">→ /WSaudioTX</text>

  <!-- TX Arrows -->
  <line x1="130" y1="153" x2="150" y2="153" stroke="rgba(255,255,255,0.15)" stroke-width="1.3"/>
  <polygon points="145,149 150,153 145,157" fill="rgba(255,255,255,0.25)"/>
  <line x1="260" y1="153" x2="280" y2="153" stroke="rgba(255,255,255,0.15)" stroke-width="1.3"/>
  <polygon points="275,149 280,153 275,157" fill="rgba(255,255,255,0.25)"/>
  <line x1="400" y1="153" x2="420" y2="153" stroke="rgba(255,255,255,0.15)" stroke-width="1.3"/>
  <polygon points="415,149 420,153 415,157" fill="rgba(255,255,255,0.25)"/>

  <!-- Stats -->
  <rect x="140" y="192" width="300" height="88" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="290" y="215" text-anchor="middle" fill="#8899aa" font-size="11" font-weight="600" font-family="sans-serif">Key Specs</text>
  <text x="170" y="238" fill="#5dade2" font-size="9" font-family="monospace">RX 48kHz</text>
  <text x="330" y="238" fill="#2ecc71" font-size="9" font-family="monospace">TX 16kHz mono</text>
  <text x="170" y="258" fill="#5c6370" font-size="9" font-family="sans-serif">PCM Int16 LE → Float32</text>
  <text x="330" y="258" fill="#5c6370" font-size="9" font-family="sans-serif">320 samples = 20ms frame</text>
  <text x="290" y="274" text-anchor="middle" fill="#5c6370" font-size="8" font-family="sans-serif">AVAudioSession: .playAndRecord @ 12kHz native</text>
</svg>

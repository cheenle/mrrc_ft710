<svg viewBox="0 0 360 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#141b24"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="0">

  <text x="76" y="547" text-anchor="middle" fill="#5c6370" font-size="11" font-family="sans-serif">---</text>
  <text x="76" y="561" text-anchor="middle" fill="#5c6370" font-size="10" font-family="monospace">--.---</text>

  <rect x="135" y="524" width="90" height="44" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="180" y="547" text-anchor="middle" fill="#5c6370" font-size="11" font-family="sans-serif">---</text>
  <text x="180" y="561" text-anchor="middle" fill="#5c6370" font-size="10" font-family="monospace">--.---</text>

  <rect x="239" y="524" width="90" height="44" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="284" y="547" text-anchor="middle" fill="#5c6370" font-size="11" font-family="sans-serif">---</text>
  <text x="284" y="561" text-anchor="middle" fill="#5c6370" font-size="10" font-family="monospace">--.---</text>


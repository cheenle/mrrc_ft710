  <!-- Phone frame -->
  <rect x="15" y="0" width="330" height="680" rx="36" fill="#0a0e14" stroke="rgba(255,255,255,0.1)" stroke-width="2" filter="url(#sh)"/>
  <rect x="120" y="8" width="120" height="24" rx="12" fill="#000"/>


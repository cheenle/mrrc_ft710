  <text x="180" y="511" text-anchor="middle" fill="#fff" font-size="11" font-family="monospace">28.074</text>

  <rect x="239" y="474" width="90" height="44" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="284" y="497" text-anchor="middle" fill="#5c6370" font-size="11" font-family="sans-serif">---</text>
  <text x="284" y="511" text-anchor="middle" fill="#5c6370" font-size="10" font-family="monospace">--.---</text>


  <circle cx="72" cy="57" r="3" fill="#2ecc71"/><text x="80" y="62" fill="#5dade2" font-size="8" font-family="sans-serif">CTRL</text>
  <circle cx="112" cy="57" r="3" fill="#2ecc71"/><text x="120" y="62" fill="#5dade2" font-size="8" font-family="sans-serif">RX</text>

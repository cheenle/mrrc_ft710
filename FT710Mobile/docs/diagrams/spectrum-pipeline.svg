<svg viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Step blocks -->
  <rect x="70" y="15" width="200" height="42" rx="8" fill="rgba(243,156,18,0.08)" stroke="rgba(243,156,18,0.2)" stroke-width="1" filter="url(#sh)"/>
  <text x="170" y="41" text-anchor="middle" fill="#f39c12" font-size="13" font-weight="700" font-family="sans-serif">WebSocket callback</text>
  <text x="170" y="52" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">serial background queue</text>

  <rect x="70" y="75" width="200" height="42" rx="8" fill="rgba(231,76,60,0.08)" stroke="rgba(231,76,60,0.2)" stroke-width="1" filter="url(#sh)"/>
  <text x="170" y="101" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="700" font-family="sans-serif">Frame Skip</text>
  <text x="170" y="112" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">50% reduction (every other frame)</text>

  <rect x="70" y="135" width="200" height="42" rx="8" fill="rgba(155,89,182,0.08)" stroke="rgba(155,89,182,0.2)" stroke-width="1" filter="url(#sh)"/>
  <text x="170" y="161" text-anchor="middle" fill="#9b59b6" font-size="13" font-weight="700" font-family="sans-serif">Background Queue</text>
  <text x="170" y="172" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">DispatchQueue.userInteractive</text>

  <rect x="70" y="195" width="200" height="42" rx="8" fill="rgba(52,152,219,0.08)" stroke="rgba(52,152,219,0.2)" stroke-width="1" filter="url(#sh)"/>
  <text x="170" y="221" text-anchor="middle" fill="#3498db" font-size="13" font-weight="700" font-family="sans-serif">Accumulate 5 Frames</text>
  <text x="170" y="232" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">sort → LUT → CGImage</text>

  <!-- Arrows between steps -->
  <line x1="170" y1="57" x2="170" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <polygon points="165,72 170,80 175,72" fill="rgba(255,255,255,0.2)"/>
  <line x1="170" y1="117" x2="170" y2="135" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <polygon points="165,132 170,140 175,132" fill="rgba(255,255,255,0.2)"/>
  <line x1="170" y1="177" x2="170" y2="195" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <polygon points="165,192 170,200 175,192" fill="rgba(255,255,255,0.2)"/>

  <!-- Right side: result boxes -->
  <!-- Final UIImage -->
  <rect x="360" y="120" width="200" height="42" rx="8" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.2)" stroke-width="1" filter="url(#sh)"/>
  <text x="460" y="146" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="700" font-family="sans-serif">waterfallImage</text>
  <text x="460" y="157" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">UIImage → @Published</text>

  <rect x="360" y="195" width="200" height="42" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#sh)"/>
  <text x="460" y="221" text-anchor="middle" fill="#8899aa" font-size="13" font-weight="700" font-family="sans-serif">WaterfallView</text>
  <text x="460" y="232" text-anchor="middle" fill="#5c6370" font-size="9" font-family="sans-serif">display only · zero processing</text>

  <!-- Arrows from accumulate to display -->
  <line x1="270" y1="216" x2="360" y2="141" stroke="rgba(255,255,255,0.12)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="408" y1="162" x2="408" y2="195" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <polygon points="403,192 408,200 413,192" fill="rgba(255,255,255,0.2)"/>

  <!-- Thread annotation -->
  <rect x="50" y="8" width="1" height="235" fill="rgba(155,89,182,0.2)"/>
  <text x="35" y="130" text-anchor="middle" fill="#9b59b6" font-size="10" font-family="sans-serif" transform="rotate(-90,35,130)" font-weight="600">BACKGROUND THREAD</text>

  <rect x="350" y="8" width="1" height="235" fill="rgba(46,204,113,0.2)"/>
  <text x="600" y="130" text-anchor="middle" fill="#2ecc71" font-size="10" font-family="sans-serif" transform="rotate(90,600,130)" font-weight="600">MAIN ACTOR</text>
</svg>

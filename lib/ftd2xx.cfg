# FTDI D2XX Configuration File for Yaesu FT-710 (FT4222 Scope Chip)
#
# COPY THIS FILE TO /usr/local/lib/ftd2xx.cfg (requires sudo):
#   sudo cp FT710/lib/ftd2xx.cfg /usr/local/lib/ftd2xx.cfg
#
# The FTDI VCP DEXT running on this system claims the FT4222.
# These settings tell D2XX to detach the kernel driver so the
# scope_pipe process can access the FT4222 directly via SPI.

[Global]
# Automatically detach kernel driver (VCP DEXT) when opening device
DetachKernelDriver=1
# Keep existing ConfigFlags (multithreaded write fix)
ConfigFlags=0x80000000

[VID_0403&PID_601C]
# FTDI FT4222 — the scope data chip in the Yaesu FT-710
DetachKernelDriver=1
ConfigFlags=0x80000000

[VID_0403&PID_6001]
# FTDI FT232R — standard FTDI serial (keep existing config)
ConfigFlags=0x80000000

[FT000001]
ConfigFlags=0x80000000
